<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directiva de Curso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0; --bg2: #ede9e1; --bg3: #e4dfd4; --card: #ffffff;
  --ink: #1c1a17; --ink2: #5a5245; --ink3: #9c9080; --border: #ddd8ce;
  --green: #2d7a4f; --green-bg: #e8f5ee;
  --amber: #b86a00; --amber-bg: #fef3dc;
  --red: #c0392b; --red-bg: #fdecea;
  --blue: #1a5fa8; --blue-bg: #e8f0fb;
  --purple: #6d4c9e; --purple-bg: #f0ebfa;
  --teal: #0f7c74; --teal-bg: #e6f4f3;
  --accent: #c0392b;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
  --shadow: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --r: 12px; --r-sm: 7px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; }
.shell { display: flex; height: 100vh; overflow: hidden; }

.sidebar { width: 230px; min-width: 230px; background: var(--ink); display: flex; flex-direction: column; overflow-y: auto; }
.sb-logo { padding: 1.4rem 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sb-logo .curso { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: -0.03em; cursor: pointer; }
.sb-logo .anio { font-family: 'Syne', monospace; font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
.sb-user { font-size: 0.65rem; color: rgba(255,255,255,0.5); margin-top: 0.5rem; word-break: break-all; }
.sb-user-badge { display: inline-block; background: rgba(192,57,43,0.3); color: #e8856d; padding: 2px 6px; border-radius: 4px; font-size: 0.55rem; font-weight: 700; margin-top: 0.3rem; }
.sb-section { padding: 1.1rem 1.25rem 0.2rem; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.28); }
.sb-item { display: flex; align-items: center; gap: 9px; padding: 0.55rem 1.25rem; margin: 1px 0.5rem; border-radius: var(--r-sm); cursor: pointer; font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.5); transition: all 0.15s; position: relative; }
.sb-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
.sb-item.active { background: rgba(255,255,255,0.1); color: #fff; }
.sb-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; background: var(--accent); border-radius: 2px; }
.sb-item .ico { font-size: 0.9rem; width: 18px; text-align: center; opacity: 0.8; }
.sb-item.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.sb-footer { margin-top: auto; padding: 1rem 1.25rem; font-size: 0.65rem; color: rgba(255,255,255,0.2); border-top: 1px solid rgba(255,255,255,0.06); line-height: 1.5; }
.sb-logout { background: rgba(192,57,43,0.2); border: 1px solid rgba(192,57,43,0.4); color: #e8856d; padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.7rem; cursor: pointer; width: 100%; text-align: center; margin-top: 0.5rem; transition: all 0.2s; }
.sb-logout:hover { background: var(--red); color: #fff; }

.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar { position: sticky; top: 0; z-index: 20; background: rgba(247,245,240,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between; }
.tb-title { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em; }
.tb-sub { font-size: 0.72rem; color: var(--ink3); margin-top: 1px; font-weight: 400; }

.inner { padding: 1.75rem 2rem; }
.page { display: none; }
.page.active { display: block; }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--r-sm); border: none; font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-dark { background: var(--ink); color: #fff; }
.btn-dark:hover { background: #333; }
.btn-ghost { background: transparent; color: var(--ink2); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--bg2); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #245f3e; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { background: #a93226; }

.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 0.875rem; margin-bottom: 1.75rem; }
.sc { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.1rem 1.25rem; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; cursor: pointer; transition: box-shadow 0.15s; }
.sc:hover { box-shadow: var(--shadow); }
.sc::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
.sc.g::after { background: var(--green); }
.sc.b::after { background: var(--blue); }
.sc.a::after { background: var(--amber); }
.sc-label { font-size: 0.64rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--ink3); margin-bottom: 0.4rem; }
.sc-val { font-family: 'Lora', serif; font-size: 1.9rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }

.moverlay { display: none; position: fixed; inset: 0; background: rgba(28,26,23,0.55); z-index: 300; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
.moverlay.open { display: flex; }
.modal { background: var(--card); border-radius: 16px; padding: 1.75rem; width: min(640px, 100%); margin: auto; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }

.login-modal-content { text-align: center; }
.login-subtitle { font-size: 0.85rem; color: var(--ink2); margin-bottom: 1.5rem; font-weight: 500; }
.login-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.pin-input-group { margin: 1.5rem 0; }
.pin-input-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink3); display: block; margin-bottom: 0.6rem; }
.pin-input-field { font-size: 1.1rem; padding: 10px; width: 100%; }
.login-error { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); padding: 0.75rem; border-radius: var(--r-sm); font-size: 0.75rem; margin-top: 0.75rem; display: none; }
.login-error.show { display: block; }
.login-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
.login-actions .btn { flex: 1; }

input, select, textarea { width: 100%; padding: 8px 11px; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r-sm); color: var(--ink); font-family: 'Syne', sans-serif; font-size: 0.82rem; transition: border-color 0.18s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--ink); }
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="curso">Directiva</div>
      <div class="anio" id="sb-anio">2025</div>
      <div class="sb-user" id="sb-user">Usuario</div>
      <div class="sb-user-badge" id="sb-role">Usuario</div>
      <button class="sb-logout" onclick="window.logout()">Salir</button>
    </div>

    <div class="sb-section">General</div>
    <div class="sb-item active" onclick="window.go('inicio')"><span class="ico">📊</span> Inicio</div>
    <div class="sb-item" onclick="window.go('familias')"><span class="ico">👨‍👩‍👧‍👦</span> Familias</div>
    <div class="sb-item" onclick="window.go('talleres')"><span class="ico">🎨</span> Talleres</div>
    <div class="sb-item" onclick="window.go('comunicados')"><span class="ico">📢</span> Comunicados</div>

    <div class="sb-section" id="sb-fin-section" style="display:none;">Finanzas</div>
    <div class="sb-item" id="sb-fin-ingresos" style="display:none;" onclick="window.go('ingresos')"><span class="ico">💰</span> Ingresos</div>
    <div class="sb-item" id="sb-fin-egresos" style="display:none;" onclick="window.go('egresos')"><span class="ico">💸</span> Egresos</div>

    <div class="sb-footer">
      Directiva de Curso 1°A<br>
      Año 2025
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="tb-title" id="page-title">Inicio</div>
        <div class="tb-sub" id="page-subtitle"></div>
      </div>
    </div>

    <div class="inner">
      <!-- INICIO -->
      <div id="page-inicio" class="page active">
        <div class="stats-row">
          <div class="sc g">
            <div class="sc-label">Familias</div>
            <div class="sc-val" id="cnt-familias">0</div>
          </div>
          <div class="sc b">
            <div class="sc-label">Talleres</div>
            <div class="sc-val" id="cnt-talleres">0</div>
          </div>
          <div class="sc a">
            <div class="sc-label">Comunicados</div>
            <div class="sc-val" id="cnt-comunicados">0</div>
          </div>
        </div>
      </div>

      <!-- FAMILIAS -->
      <div id="page-familias" class="page">
        <h2 style="margin-bottom: 1rem;">Familias</h2>
        <button class="btn btn-green" onclick="window.alert('Función en desarrollo')">+ Agregar Familia</button>
      </div>

      <!-- TALLERES -->
      <div id="page-talleres" class="page">
        <h2 style="margin-bottom: 1rem;">Talleres</h2>
        <button class="btn btn-green" onclick="window.alert('Función en desarrollo')">+ Crear Taller</button>
      </div>

      <!-- COMUNICADOS -->
      <div id="page-comunicados" class="page">
        <h2 style="margin-bottom: 1rem;">Comunicados</h2>
        <button class="btn btn-green" onclick="window.alert('Función en desarrollo')">+ Nuevo Comunicado</button>
      </div>

      <!-- INGRESOS -->
      <div id="page-ingresos" class="page">
        <h2 style="margin-bottom: 1rem;">Ingresos</h2>
        <button class="btn btn-green" onclick="window.alert('Función en desarrollo')">+ Registrar Ingreso</button>
      </div>

      <!-- EGRESOS -->
      <div id="page-egresos" class="page">
        <h2 style="margin-bottom: 1rem;">Egresos</h2>
        <button class="btn btn-green" onclick="window.alert('Función en desarrollo')">+ Registrar Egreso</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Login -->
<div class="moverlay open" id="login-modal">
  <div class="modal">
    <div class="login-modal-content">
      <div class="login-icon">👤</div>
      <h2 style="font-family: 'Lora', serif; font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem;">Bienvenido</h2>
      <div class="login-subtitle">Ingresa tu email para acceder</div>
      
      <div class="pin-input-group">
        <label class="pin-input-label">Email</label>
        <input type="email" id="login-email" class="pin-input-field" placeholder="tu@email.com">
      </div>
      
      <div class="login-error" id="login-error"></div>
      
      <div class="login-actions">
        <button type="button" class="btn btn-dark" id="btn-acceder">Acceder</button>
      </div>
    </div>
  </div>
</div>

<script>
// CONFIGURACIÓN GLOBAL
const CONFIG = {
  SUPABASE_URL: 'https://styzobqvdrvvrbjtavix.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0eXpvYnF2ZHJ2dnJianRhdml4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjY4ODUsImV4cCI6MjA5MDMwMjg4NX0.TTpzZ3QUQKaMJQz3pkRS1aRBB8qOpVaH4FnbMOYqhjE',
  ADMIN_EMAILS: [
    'pumarinoj@gmail.com',
    'fernanda.oreamuno@gmail.com',
    'ligiaschwarz@gmail.com',
    'magdalenagarciac@gmail.com',
    'paulina_carvajal@hotmail.com',
    'matias.contente@gmail.com',
    'g.penaespinoza@gmail.com',
    'felipeberriosmiranda@gmail.com'
  ]
};

let supabase = null;
const APP = {
  user: { email: null, isAdmin: false },
  data: { familias: [], talleres: [], comunicados: [], ingresos: [], egresos: [] }
};

// Inicializar Supabase cuando esté disponible
function initSupabase() {
  if (window.supabase && !supabase) {
    supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
    console.log('✓ Supabase inicializado');
    return true;
  }
  return false;
}

// Esperar a que Supabase esté disponible
let attempts = 0;
const initInterval = setInterval(() => {
  if (initSupabase()) {
    clearInterval(initInterval);
  } else {
    attempts++;
    if (attempts > 100) {
      clearInterval(initInterval);
      console.error('✗ Supabase no se pudo inicializar');
    }
  }
}, 100);

// Cuando el DOM esté listo
document.addEventListener('DOMContentLoaded', () => {
  console.log('✓ DOM cargado');
  
  // Botón Acceder
  document.getElementById('btn-acceder').addEventListener('click', () => {
    const email = document.getElementById('login-email').value.trim();
    if (!email) {
      showLoginError('Por favor ingresa tu email');
      return;
    }
    login(email);
  });
  
  // Cargar email guardado
  const saved = localStorage.getItem('app-email');
  if (saved) {
    login(saved);
  }
});

// LOGIN
async function login(email) {
  try {
    if (!supabase) {
      showLoginError('Sistema no listo. Intenta de nuevo.');
      return;
    }
    
    console.log('Intentando login:', email);
    
    APP.user.email = email;
    APP.user.isAdmin = CONFIG.ADMIN_EMAILS.includes(email);
    
    localStorage.setItem('app-email', email);
    
    document.getElementById('sb-user').textContent = email;
    document.getElementById('sb-role').textContent = APP.user.isAdmin ? '👑 Admin' : '📝 Apoderado';
    
    // Mostrar finanzas solo para admins
    if (APP.user.isAdmin) {
      document.getElementById('sb-fin-section').style.display = 'block';
      document.getElementById('sb-fin-ingresos').style.display = 'flex';
      document.getElementById('sb-fin-egresos').style.display = 'flex';
    }
    
    // Cargar datos
    console.log('Cargando datos...');
    await loadData();
    
    // Cerrar modal
    document.getElementById('login-modal').classList.remove('open');
    document.getElementById('page-title').textContent = 'Inicio';
    
    updateCounts();
    console.log('✓ Login exitoso');
    
  } catch (err) {
    console.error('Error:', err);
    showLoginError('Error: ' + err.message);
  }
}

// CARGAR DATOS
async function loadData() {
  try {
    const { data: familias } = await supabase.from('familias').select('*').throwOnError();
    const { data: talleres } = await supabase.from('talleres').select('*').throwOnError();
    const { data: comunicados } = await supabase.from('comunicados').select('*').throwOnError();
    const { data: ingresos } = await supabase.from('ingresos').select('*').throwOnError();
    const { data: egresos } = await supabase.from('egresos').select('*').throwOnError();
    
    APP.data = {
      familias: familias || [],
      talleres: talleres || [],
      comunicados: comunicados || [],
      ingresos: ingresos || [],
      egresos: egresos || []
    };
    
    console.log('✓ Datos cargados:', APP.data);
  } catch (err) {
    console.warn('Error cargando datos (probablemente tablas no existen):', err.message);
    // Inicializar con datos vacíos
    APP.data = {
      familias: [],
      talleres: [],
      comunicados: [],
      ingresos: [],
      egresos: []
    };
  }
}

// LOGOUT
window.logout = function() {
  localStorage.removeItem('app-email');
  APP.user = { email: null, isAdmin: false };
  document.getElementById('login-modal').classList.add('open');
  document.getElementById('login-email').value = '';
};

// NAVEGACIÓN
window.go = function(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  
  document.getElementById('page-' + page).classList.add('active');
  event?.target?.closest('.sb-item')?.classList.add('active');
  
  const titles = {
    inicio: 'Inicio',
    familias: 'Familias',
    talleres: 'Talleres',
    comunicados: 'Comunicados',
    ingresos: 'Ingresos',
    egresos: 'Egresos'
  };
  
  document.getElementById('page-title').textContent = titles[page] || 'Página';
};

// ACTUALIZAR CONTADORES
function updateCounts() {
  document.getElementById('cnt-familias').textContent = APP.data.familias?.length || 0;
  document.getElementById('cnt-talleres').textContent = APP.data.talleres?.length || 0;
  document.getElementById('cnt-comunicados').textContent = APP.data.comunicados?.length || 0;
}

// MOSTRAR ERROR
function showLoginError(msg) {
  const err = document.getElementById('login-error');
  err.textContent = msg;
  err.classList.add('show');
  setTimeout(() => err.classList.remove('show'), 4000);
}
</script>

</body>
</html>
