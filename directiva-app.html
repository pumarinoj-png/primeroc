<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directiva</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#333}
.app{display:flex;height:100vh}
.sidebar{width:250px;background:#1a1a1a;color:white;padding:20px;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column}
.header{background:white;padding:20px;border-bottom:1px solid #ddd}
.content{flex:1;padding:20px;overflow-y:auto}
.page{display:none}
.page.active{display:block}
button{padding:10px 15px;margin:5px;border:none;border-radius:4px;cursor:pointer;font-weight:600}
.dark{background:#1a1a1a;color:white}
.dark:hover{background:#333}
.nav-item{display:block;width:100%;text-align:left;background:0;border:0;color:white;padding:10px;margin:5px 0}
.nav-item:hover{background:rgba(255,255,255,0.1)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999}
.modal-bg.hidden{display:none}
.modal{background:white;padding:30px;border-radius:8px;width:400px}
.modal h2{margin-bottom:20px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-weight:600}
.form-group input{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px}
.error{background:#fee;border:1px solid #c33;color:#c00;padding:10px;border-radius:4px;margin-bottom:15px;display:none}
.error.show{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px}
.stat{background:white;padding:20px;border-radius:8px;text-align:center;border:1px solid #ddd}
.num{font-size:36px;font-weight:700;color:#2d7a4f}
.label{color:#999;font-size:12px;text-transform:uppercase;margin-top:10px}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <h2 style="margin-bottom:30px">📋 Directiva</h2>
    <div style="margin-bottom:30px;border-bottom:1px solid #444;padding-bottom:20px">
      <div id="user" style="font-size:14px">Usuario</div>
      <div id="role" style="font-size:12px;color:#aaa">Apoderado</div>
    </div>
    <button class="nav-item" data-page="inicio">📊 Inicio</button>
    <button class="nav-item" data-page="familias">👨‍👩‍👧‍👦 Familias</button>
    <button class="nav-item" data-page="talleres">🎨 Talleres</button>
    <button class="nav-item" data-page="comunicados">📢 Comunicados</button>
    <div id="fin-nav" style="display:none;margin-top:20px;padding-top:20px;border-top:1px solid #444">
      <p style="font-size:12px;color:#999;text-transform:uppercase;margin-bottom:10px">Finanzas</p>
      <button class="nav-item" data-page="ingresos">💰 Ingresos</button>
      <button class="nav-item" data-page="egresos">💸 Egresos</button>
    </div>
    <button class="dark" id="logout" style="width:100%;margin-top:20px">Salir</button>
  </div>

  <div class="main">
    <div class="header">
      <h1 id="title" style="margin:0">Inicio</h1>
    </div>
    <div class="content">
      <div id="inicio" class="page active">
        <div class="stats">
          <div class="stat"><div class="num" id="n-fam">0</div><div class="label">Familias</div></div>
          <div class="stat"><div class="num" id="n-tal">0</div><div class="label">Talleres</div></div>
          <div class="stat"><div class="num" id="n-com">0</div><div class="label">Comunicados</div></div>
        </div>
      </div>
      <div id="familias" class="page"><h2>Familias</h2><p>En desarrollo...</p></div>
      <div id="talleres" class="page"><h2>Talleres</h2><p>En desarrollo...</p></div>
      <div id="comunicados" class="page"><h2>Comunicados</h2><p>En desarrollo...</p></div>
      <div id="ingresos" class="page"><h2>Ingresos</h2><p>En desarrollo...</p></div>
      <div id="egresos" class="page"><h2>Egresos</h2><p>En desarrollo...</p></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Bienvenido</h2>
    <p style="color:#666;margin-bottom:20px">Ingresa tu email</p>
    <div class="error" id="err"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="mail" placeholder="tu@email.com">
    </div>
    <button class="dark" id="login" style="width:100%">Acceder</button>
  </div>
</div>

<script>
const ADMINS = ['pumarinoj@gmail.com','fernanda.oreamuno@gmail.com','ligiaschwarz@gmail.com','magdalenagarciac@gmail.com','paulina_carvajal@hotmail.com','matias.contente@gmail.com','g.penaespinoza@gmail.com','felipeberriosmiranda@gmail.com'];
const URL = 'https://styzobqvdrvvrbjtavix.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0eXpvYnF2ZHJ2dnJianRhdml4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjY4ODUsImV4cCI6MjA5MDMwMjg4NX0.TTpzZ3QUQKaMJQz3pkRS1aRBB8qOpVaH4FnbMOYqhjE';

let db = null;
let user = {email: null, admin: false};

setTimeout(() => {
  if(window.supabase) db = window.supabase.createClient(URL, KEY);
}, 500);

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login').onclick = login;
  document.getElementById('logout').onclick = logout;
  
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.onclick = () => {
      const p = btn.getAttribute('data-page');
      document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
      document.getElementById(p).classList.add('active');
      document.getElementById('title').textContent = p.charAt(0).toUpperCase() + p.slice(1);
    };
  });
  
  const saved = localStorage.getItem('mail');
  if(saved) auth(saved);
});

function login() {
  const mail = document.getElementById('mail').value.trim();
  if(!mail) {
    err('Ingresa tu email');
    return;
  }
  if(!db) {
    err('Sistema no listo');
    return;
  }
  auth(mail);
}

function auth(mail) {
  user.email = mail;
  user.admin = ADMINS.includes(mail);
  
  localStorage.setItem('mail', mail);
  document.getElementById('user').textContent = mail;
  document.getElementById('role').textContent = user.admin ? '👑 Admin' : '📝 Apoderado';
  
  if(user.admin) {
    document.getElementById('fin-nav').style.display = 'block';
  }
  
  document.getElementById('modal').classList.add('hidden');
  load();
}

function logout() {
  localStorage.removeItem('mail');
  user = {email: null, admin: false};
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('mail').value = '';
}

async function load() {
  try {
    const r1 = await db.from('familias').select('*');
    const r2 = await db.from('talleres').select('*');
    const r3 = await db.from('comunicados').select('*');
    
    document.getElementById('n-fam').textContent = (r1.data || []).length;
    document.getElementById('n-tal').textContent = (r2.data || []).length;
    document.getElementById('n-com').textContent = (r3.data || []).length;
    
    console.log('OK');
  } catch(e) {
    console.log('Tablas no existen:', e.message);
  }
}

function err(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 3000);
}
</script>

</body>
</html>
