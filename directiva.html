os',talleres:'Talleres',comunicados:'Comunicados',actividades:'Actividades',ingresos:'Ingresos',egresos:'Egresos',ajustes:'Ajustes'};document.getElementById('page-title').textContent=t[p];if(p==='inicio')renderInicio();else if(p==='familias')renderFam();else if(p==='cumpleanos')renderCum();else if(p==='talleres')renderTal();else if(p==='comunicados'){document.getElementById('btn-new-com').style.display=user.admin?'block':'none';renderCom()}else if(p==='actividades')renderAct();else if(p==='ingresos')renderIng();else if(p==='egresos'){renderEgr()}}function sortTable(t,c){if(t==='fam'){sortOrder.fam_col=c;sortOrder.fam_dir=sortOrder.fam_dir==='asc'?'desc':'asc'}else if(t==='cum'){sortOrder.cum_col=c;sortOrder.cum_dir=sortOrder.cum_dir==='asc'?'desc':'asc'}else if(t==='ing'){sortOrder.ing_col=c;sortOrder.ing_dir=sortOrder.ing_dir==='asc'?'desc':'asc'}if(t==='fam')renderFam();else if(t==='cum')renderCum();else if(t==='ing')renderIng()}function renderInicio(){

(data.actividades||[]).forEach(a=>{if(!a.fecha)return;const[y,m,d]=a.fecha.split('-');const fa=new Date(y,m-1,d);fa.setHours(0,0,0,0);if(fa>=inicioProxSemana&&fa<=finProxSemana){h2+=`<div class="item-card"><p style="font-size:0.8rem;color:var(--ink3)">${fa.toLocaleDateString('es-CL')}</p><h3 style="margin:0.3rem 0">${a.titulo}</h3></div>`}});

}function renderFam(){let f=data.familias||[];if(!user.admin)f=f.filter(x=>x.email===user.email);const col=sortOrder.fam_col||'nombre';const dir=sortOrder.fam_dir||'asc';if(col==='nombre'){f=[...f].sort((a,b)=>(a.alumno_nombre||'').localeCompare(b.alumno_nombre||''));if(dir==='desc')f.reverse()}else if(col==='apellido'){f=[...f].sort((a,b)=>(a.alumno_apellido||'').localeCompare(b.alumno_apellido||''));if(dir==='desc')f.reverse()}else if(col==='apod'){f=[...f].sort((a,b)=>(a.nombre_apoderado1||'').localeCompare(b.nombre_apoderado1||''));if(dir==='desc')f.reverse()}let h='';f.forEach(x=>{h+=`<tr><td>${x.alumno_apellido||''}</td><td>${x.alumno_nombre||''}</td><td>${x.apellidos_apoderado1||''} ${x.nombre_apoderado1||''}</td><td style="display:flex;gap:0.3rem"><button class="btn btn-sm btn-ghost" onclick="editFam('${x.id}')">Editar</button><button class="btn btn-sm btn-red" onclick="delFam('${x.id}')">Eliminar</button></td></tr>`});document.getElementById('fam-list').innerHTML=h||'<tr><td colspan="4" style="text-align:center;color:var(--ink3)">Sin familias</td></tr>'}function renderCum(){let c=[];(data.familias||[]).forEach(f=>{if(f.alumno_fecha){c.push({nombre:`${f.alumno_apellido||''} ${f.alumno_nombre||''} (alumno)`,fecha_nacimiento:f.alumno_fecha})}if(f.nombre_apoderado1&&f.fecha_nacimiento_apoderado1){c.push({nombre:`${f.apellidos_apoderado1||''} ${f.nombre_apoderado1||''} (${f.relacion_apoderado1||'apoderado 1'})`,fecha_nacimiento:f.fecha_nacimiento_apoderado1})}if(f.nombre_apoderado2&&f.fecha_nacimiento_apoderado2){c.push({nombre:`${f.apellidos_apoderado2||''} ${f.nombre_apoderado2||''} (${f.relacion_apoderado2||'apoderado 2'})`,fecha_nacimiento:f.fecha_nacimiento_apoderado2})}});const col=sortOrder.cum_col||'fecha';const dir=sortOrder.cum_dir||'asc';if(col==='nombre'){c=[...c].sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));if(dir==='desc')c.reverse()}else if(col==='fecha'){c=[...c].sort((a,b)=>{const da=new Date(a.fecha_nacimiento).getMonth()*100+new Date(a.fecha_nacimiento).getDate();const db=new Date(b.fecha_nacimiento).getMonth()*100+new Date(b.fecha_nacimiento).getDate();return da-db});if(dir==='desc')c.reverse()}let h='';c.forEach(x=>{const f=new Date(x.fecha_nacimiento);const m=f.toLocaleDateString('es-CL',{month:'long'});h+=`<tr><td>${x.nombre||''}</td><td>${new Date(x.fecha_nacimiento).toLocaleDateString('es-CL')}</td><td>${m.charAt(0).toUpperCase()+m.slice(1)}</td></tr>`});document.getElementById('cum-list').innerHTML=h||'<tr><td colspan="3" style="text-align:center">Sin cumpleaños</td></tr>'}function openFamiliaModal(id=null){let th='<label style="display:flex;gap:0.5rem;margin-bottom:0.5rem"><input type="checkbox" value="" class="tc"> Ninguno</label>';(data.talleres||[]).forEach(t=>{th+=`<label style="display:flex;gap:0.5rem;margin-bottom:0.5rem"><input type="checkbox" value="${t.id}" class="tc"> ${t.icono} ${t.nombre}</label>`});document.getElementById('tall-sel').innerHTML=th;document.getElementById('herm-cont').innerHTML='';if(id){const f=(data.familias||[]).find(x=>x.id===id);if(f){document.getElementById('fa1-nom').value=f.nombre_apoderado1||'';document.getElementById('fa1-ape').value=f.apellidos_apoderado1||'';document.getElementById('fa1-rel').value=f.relacion_apoderado1||'';document.getElementById('fa1-fecha').value=f.fecha_nacimiento_apoderado1||'';document.getElementById('fa1-email').value=f.email||'';document.getElementById('fa1-tel').value=f.telefono_apoderado1||'';document.getElementById('fa1-prof').value=f.profesion_apoderado1||'';document.getElementById('fa1-emp').value=f.empresa_apoderado1||'';document.getElementById('fa1-aporte').value=f.aporte_apoderado1||'';document.getElementById('fa2-nom').value=f.nombre_apoderado2||'';document.getElementById('fa2-ape').value=f.apellidos_apoderado2||'';document.getElementById('fa2-rel').value=f.relacion_apoderado2||'';document.getElementById('fa2-fecha').value=f.fecha_nacimiento_apoderado2||'';document.getElementById('fa2-email').value=f.email_apoder
